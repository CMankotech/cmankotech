name = "groq-proxy"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Optional: forward /orchestrate to a dedicated LangGraph service
# [vars]
# LANGGRAPH_ORCHESTRATOR_URL = "https://your-langgraph-service/orchestrate"

# Langfuse observability (optional, non-blocking) — set via CLI:
#   wrangler secret put LANGFUSE_PUBLIC_KEY
#   wrangler secret put LANGFUSE_SECRET_KEY
# Or: Cloudflare Dashboard > Workers > groq-proxy > Settings > Variables & Secrets

# Notion export (one-click OAuth) — set via CLI:
#   wrangler secret put NOTION_CLIENT_ID
#   wrangler secret put NOTION_CLIENT_SECRET
# Create a PUBLIC OAuth integration at https://www.notion.so/my-integrations
#   capability: Insert content
#   redirect URI (must match exactly): https://groq-proxy.cmankotech.workers.dev/oauth/notion/callback
# OAuth state + page payload are stored transiently in VEILLE_STORE
# (key prefix oauth_state_, TTL 10 min), so no extra KV namespace is required.

# Usage counter — create with: wrangler kv:namespace create "USAGE_COUNTER"
# Then replace the id below with the output id
[[kv_namespaces]]
binding = "USAGE_COUNTER"
id = "61e2adfa0a7541fea335e0aa63c479b4"

[[kv_namespaces]]
binding = "VEILLE_STORE"
id = "48e9fef3f7d94c20a2934ab476d6a673"

[ai]
binding = "AI"

# Weekly veille refresh : Monday 06:00 UTC. The scheduled() handler regenerates
# the current ISO week's edition (fetch RSS + Groq synthesis + archive), so the
# history grows on its own without any external (Make) trigger.
[triggers]
# Daily 03:00 UTC : re-extract the live site pages into the chatbot KB (site_kb_v1).
crons = ["0 6 * * 1", "0 3 * * *"]
