<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preview IA tech background</title>
  <style>
    html,
    body,
    iframe {
      width: 100%;
      height: 100%;
      margin: 0;
      border: 0;
      background: #08080f;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <iframe id="sitePreview" src="./index.html" title="Preview IA tech background"></iframe>
  <script>
    const preview = document.getElementById("sitePreview");

    preview.addEventListener("load", () => {
      const doc = preview.contentDocument;
      const video = doc && doc.querySelector(".hero-video");
      const source = video && video.querySelector("source");

      if (!video || !source) return;

      source.src = "assets/ai-tech-bg-preview.webm?v=smooth60";
      source.type = "video/webm";
      video.load();
      video.play().catch(() => {});
    });
  </script>
</body>
</html>
