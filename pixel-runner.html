<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Runner — Mini-jeu arcade</title>
  <style>
    :root{--bg:#08080f;--panel:#121222;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--danger:#f43f5e}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top,#121a2f,var(--bg));font-family:Inter,system-ui,sans-serif;color:var(--text)}
    .game-wrap{width:min(760px,95vw);padding:1.2rem;border:1px solid rgba(255,255,255,.1);background:linear-gradient(180deg,rgba(22,22,40,0.55),rgba(18,18,34,0.7));border-radius:14px;backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);box-shadow:inset 0 1px 0 rgba(255,255,255,0.06),0 20px 50px -20px rgba(0,0,0,0.55),0 0 60px -30px rgba(96,165,250,0.22)}
    .top{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:.8rem}
    .title{font-size:1.15rem;font-weight:700}
    .muted{color:var(--muted);font-size:.9rem}
    .stats{display:flex;gap:1rem;font-size:.92rem}
    .pill{padding:.25rem .6rem;border-radius:999px;border:1px solid rgba(255,255,255,.16)}
    canvas{width:100%;max-width:720px;aspect-ratio:16/9;background:linear-gradient(180deg,#0f172a,#020617);border:1px solid rgba(255,255,255,.1);border-radius:10px;display:block}
    .actions{display:flex;justify-content:space-between;align-items:center;gap:.8rem;margin-top:.75rem;flex-wrap:wrap}
    button,a{border:1px solid rgba(56,189,248,.45);background:rgba(56,189,248,.12);color:#bae6fd;padding:.45rem .9rem;border-radius:999px;text-decoration:none;cursor:pointer}
    button:hover,a:hover{opacity:.85}
    .danger{border-color:rgba(244,63,94,.45);background:rgba(244,63,94,.15);color:#fecdd3}
    /* THEME TOGGLE */
    .theme-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:99px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.04);cursor:pointer;color:#94a3b8;transition:all 0.2s;padding:0;flex-shrink:0;position:fixed;top:1rem;right:1.25rem;z-index:300}
    .theme-btn:hover{color:#e2e8f0;border-color:rgba(255,255,255,0.25)}
    /* LIGHT MODE */
    [data-theme="light"]{--bg:#f4f6fb;--panel:#e8edf5;--text:#0f172a;--muted:#64748b;--accent:#0ea5e9;--danger:#e11d48}
    [data-theme="light"] body{background:radial-gradient(circle at top,#dbeafe,#f4f6fb)}
    [data-theme="light"] .game-wrap{background:rgba(255,255,255,0.75);border-color:rgba(15,23,42,0.1);box-shadow:0 4px 20px rgba(15,23,42,0.1)}
    [data-theme="light"] .pill{border-color:rgba(15,23,42,0.15);color:#0f172a}
    [data-theme="light"] .muted{color:#64748b}
    [data-theme="light"] button,[data-theme="light"] a{border-color:rgba(14,165,233,0.45);background:rgba(14,165,233,0.1);color:#0369a1}
    [data-theme="light"] .danger{border-color:rgba(225,29,72,0.45);background:rgba(225,29,72,0.08);color:#be123c}
    [data-theme="light"] .theme-btn{border-color:rgba(15,23,42,0.15);background:rgba(15,23,42,0.04);color:#64748b}
    [data-theme="light"] .theme-btn:hover{color:#0f172a;border-color:rgba(15,23,42,0.25)}
  </style>
</head>
<body>
  <main class="game-wrap">
    <div class="top">
      <div>
        <div class="title">🎮 Pixel Runner</div>
        <div class="muted">Déplace-toi avec ← →, évite les blocs rouges. Espace = pause.</div>
      </div>
      <div class="stats">
        <span class="pill">Score: <strong id="score">0</strong></span>
        <span class="pill">Record: <strong id="best">0</strong></span>
      </div>
    </div>
    <canvas id="game" width="720" height="405" aria-label="Jeu Pixel Runner"></canvas>
    <div class="actions">
      <div class="muted" id="status">Appuie sur « Nouvelle partie » pour jouer.</div>
      <div>
        <button id="restart">Nouvelle partie</button>
        <a class="danger" href="./index.html">Retour portfolio</a>
      </div>
    </div>
  </main>

  <script>
    const c = document.getElementById('game');
    const ctx = c.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const statusEl = document.getElementById('status');

    const W = c.width, H = c.height;
    const player = { x: W/2-16, y: H-52, w: 32, h: 32, speed: 6 };
    let obstacles = [];
    let score = 0;
    let best = Number(localStorage.getItem('pixel-runner-best') || 0);
    let running = false;
    let paused = false;
    let spawnTick = 0;
    const keys = { left:false, right:false };

    bestEl.textContent = String(best);

    function reset(){
      obstacles = [];
      score = 0;
      spawnTick = 0;
      paused = false;
      running = true;
      player.x = W/2-player.w/2;
      scoreEl.textContent = '0';
      statusEl.textContent = 'Partie en cours...';
    }

    function spawnObstacle(){
      const w = 26 + Math.random()*38;
      obstacles.push({ x: Math.random()*(W-w), y: -20, w, h: 18 + Math.random()*26, speed: 3 + Math.random()*2.6 + score/220 });
    }

    function collide(a,b){
      return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
    }

    function drawPlayer(){
      ctx.fillStyle = '#38bdf8';
      ctx.fillRect(player.x, player.y, player.w, player.h);
      ctx.fillStyle = '#e2e8f0';
      ctx.fillRect(player.x+6, player.y+8, 6, 6);
      ctx.fillRect(player.x+20, player.y+8, 6, 6);
    }

    function drawObstacle(o){
      ctx.fillStyle = '#f43f5e';
      ctx.fillRect(o.x, o.y, o.w, o.h);
    }

    function frame(){
      ctx.clearRect(0,0,W,H);

      if(running && !paused){
        if(keys.left) player.x -= player.speed;
        if(keys.right) player.x += player.speed;
        player.x = Math.max(0, Math.min(W-player.w, player.x));

        spawnTick++;
        if(spawnTick > Math.max(14, 42 - Math.floor(score/45))){
          spawnObstacle();
          spawnTick = 0;
        }

        for(let i=obstacles.length-1;i>=0;i--){
          const o = obstacles[i];
          o.y += o.speed;
          drawObstacle(o);
          if(collide(player,o)){
            running = false;
            statusEl.textContent = '💥 Game Over — Clique sur « Nouvelle partie ». '; 
            if(score > best){
              best = score;
              localStorage.setItem('pixel-runner-best', String(best));
              bestEl.textContent = String(best);
            }
          }
          if(o.y > H+40){ obstacles.splice(i,1); score += 5; scoreEl.textContent = String(score); }
        }
      } else {
        obstacles.forEach(drawObstacle);
      }

      drawPlayer();

      requestAnimationFrame(frame);
    }

    document.getElementById('restart').addEventListener('click', reset);
    window.addEventListener('keydown', (e) => {
      if(e.key === 'ArrowLeft') keys.left = true;
      if(e.key === 'ArrowRight') keys.right = true;
      if(e.code === 'Space' && running){
        paused = !paused;
        statusEl.textContent = paused ? '⏸️ Pause' : 'Partie en cours...';
      }
    });
    window.addEventListener('keyup', (e) => {
      if(e.key === 'ArrowLeft') keys.left = false;
      if(e.key === 'ArrowRight') keys.right = false;
    });

    frame();
  </script>
<button class="theme-btn" aria-label="Passer en mode clair"></button>
<script>
(function(){
  var SUN='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
  var MOON='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  function applyTheme(t){
    if(t==='light') document.documentElement.setAttribute('data-theme','light');
    else document.documentElement.removeAttribute('data-theme');
    document.querySelectorAll('.theme-btn').forEach(function(b){
      b.innerHTML=t==='light'?MOON:SUN;
      b.setAttribute('aria-label',t==='light'?'Passer en mode sombre':'Passer en mode clair');
    });
    localStorage.setItem('theme',t);
  }
  var saved=localStorage.getItem('theme')||'dark';
  applyTheme(saved);
  document.addEventListener('click',function(e){
    var btn=e.target.closest?e.target.closest('.theme-btn'):null;
    if(btn){var cur=document.documentElement.getAttribute('data-theme');applyTheme(cur==='light'?'dark':'light');}
  });
})();
</script>
<script src="glass.js"></script>
</body>
</html>
